<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Boot</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: monospace;
  overflow: hidden;
}

#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  color: red;
  text-align: center;
  z-index: 9999;
}

#title {
  margin-top: 40%;
  font-size: 22px;
  animation: blink 0.8s infinite;
}

@keyframes blink {
  50% { opacity: 0.2; }
}

#status {
  margin-top: 20px;
  color: white;
  font-size: 14px;
}
</style>
</head>

<body>

<div id="overlay">
  <div id="title">⚠ SYSTEM INITIALIZING ⚠</div>
  <div id="status">Booting Codex AI...</div>
</div>

<script>
window.onload = function() {
  startScan();
};

function startScan() {

  // try fullscreen (may require interaction on some devices)
  document.documentElement.requestFullscreen?.();

  let overlay = document.getElementById("overlay");
  let status = document.getElementById("status");

  let steps = [
    "Scanning device...",
    "Checking system integrity...",
    "Detecting threats...",
    "Bypassing firewall...",
    "Connecting Codex AI...",
    "System takeover active..."
  ];

  let i = 0;

  let interval = setInterval(() => {

    status.innerText = steps[i] || "Processing...";

    if (navigator.vibrate) navigator.vibrate(100);

    document.body.style.marginLeft = (Math.random()*10 - 5) + "px";

    i++;

    if (i >= steps.length) {
      clearInterval(interval);

      setTimeout(() => {
        overlay.innerHTML = `
          <div style="color:lime; margin-top:40%; font-size:20px;">
            😂 PRANK COMPLETE 😂<br><br>
            Device safe 😎
          </div>
        `;
      }, 1500);
    }

  }, 1000);
}
</script>

</body>
</html>
