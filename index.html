<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Boot</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: monospace;
  overflow: hidden;
  text-align: center;
}

#center {
  margin-top: 35%;
  font-size: 18px;
  color: lime;
}

#bar {
  width: 80%;
  height: 20px;
  border: 2px solid lime;
  margin: 20px auto;
}

#fill {
  height: 100%;
  width: 0%;
  background: lime;
}

#msg {
  margin-top: 20px;
  color: white;
  font-size: 14px;
}

#btn {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px;
  background: red;
  color: white;
  border: none;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="center">SYSTEM BOOTING...</div>

<div id="bar">
  <div id="fill"></div>
</div>

<div id="msg">Waiting for secure connection...</div>

<button id="btn" onclick="start()">Start Scan</button>

<script>
function start() {
  document.documentElement.requestFullscreen();
  document.getElementById("btn").style.display = "none";

  let fill = document.getElementById("fill");
  let msg = document.getElementById("msg");

  let progress = 0;

  let steps = [
    "Connecting secure node...",
    "Analyzing device...",
    "Encrypting system data...",
    "Scanning hidden files...",
    "Detecting intrusion signals...",
    "Preparing response..."
  ];

  let i = 0;

  let interval = setInterval(() => {

    progress += 5;
    fill.style.width = progress + "%";

    msg.innerText = steps[i] || "Processing...";
    i++;

    if (navigator.vibrate) navigator.vibrate(100);

    document.body.style.marginLeft = (Math.random()*8 - 4) + "px";

    if (progress >= 100) {
      clearInterval(interval);

      setTimeout(() => {
        showChat();
      }, 3000); // 🔥 SUSPENSE DELAY
    }

  }, 800);
}

function showChat() {
  document.body.innerHTML = `
    <div style="padding:10px; font-family:monospace;">
      <h3 style="color:red;">Codex AI Terminal</h3>
      <div id="chat"></div>
    </div>
  `;

  let chat = document.getElementById("chat");

  function add(t, c) {
    let d = document.createElement("div");
    d.style.margin = "10px 0";
    d.style.color = c;
    d.innerText = t;
    chat.appendChild(d);
  }

  // 🔥 slow build chat
  setTimeout(() => add("Connecting to Codex AI...", "red"), 1000);
  setTimeout(() => add("Connection established.", "cyan"), 3000);
  setTimeout(() => add("Scanning user device... please wait", "red"), 5000);
  setTimeout(() => add("User: bhai kya ho raha hai 😨", "lime"), 7000);

  setTimeout(() => {
    add("😂 Relax... system simulation running only", "cyan");
  }, 10000);

  setTimeout(() => {
    document.body.innerHTML = `
      <h1 style="color:lime; text-align:center; margin-top:40%">
      😂 PRANK COMPLETE 😂<br><br>
      CHUTIYA BANAYA TERE KO 😎
      </h1>
    `;
  }, 14000);
}
</script>

</body>
</html>
