<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Boot</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: monospace;
  overflow: hidden;
  color: white;
}

/* FULL SCREEN FAKE LOCK UI */
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 9999;
  text-align: center;
}

#title {
  margin-top: 40%;
  font-size: 22px;
  color: red;
  animation: blink 0.8s infinite;
}

@keyframes blink {
  50% { opacity: 0.2; }
}

#status {
  margin-top: 20px;
  font-size: 14px;
  color: white;
}

/* TAP HINT */
#hint {
  position: fixed;
  bottom: 20px;
  width: 100%;
  text-align: center;
  color: lime;
  font-size: 14px;
  z-index: 5;
}
</style>
</head>

<body onclick="startPrank()">

<div id="hint">Tap anywhere to verify system</div>

<div id="overlay">
  <div id="title">⚠ SYSTEM INITIALIZING ⚠</div>
  <div id="status">Waiting for secure input...</div>
</div>

<script>
function startPrank() {

  // fullscreen (must be user tap)
  let elem = document.documentElement;

  if (elem.requestFullscreen) {
    elem.requestFullscreen();
  } else if (elem.webkitRequestFullscreen) {
    elem.webkitRequestFullscreen();
  }

  let overlay = document.getElementById("overlay");
  let status = document.getElementById("status");
  let hint = document.getElementById("hint");

  hint.style.display = "none";

  let steps = [
    "Scanning device...",
    "Analyzing system files...",
    "Detecting threats...",
    "Bypassing security layer...",
    "Connecting Codex AI...",
    "System lock engaged..."
  ];

  let i = 0;

  let interval = setInterval(() => {

    status.innerText = steps[i] || "Processing...";

    // vibration (android only)
    if (navigator.vibrate) navigator.vibrate(120);

    // shake effect
    document.body.style.marginLeft = (Math.random()*10 - 5) + "px";

    i++;

    if (i >= steps.length) {
      clearInterval(interval);

      setTimeout(() => {
        overlay.innerHTML = `
          <div style="color:lime; margin-top:40%; font-size:20px;">
            😂 PRANK COMPLETE 😂<br><br>
            System restored successfully 😎
          </div>
        `;
      }, 1500);
    }

  }, 900);
}
</script>

</body>
</html>
